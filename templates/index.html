<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mihomo → Dae/daed 订阅转换</title>
  <style>
    :root { --bg: #f5f5f5; --card-bg: #fff; --text: #333; --text-muted: #666; --accent: #2563eb; --accent-h: #1d4ed8; --border: #e5e7eb; --code-bg: #f0f0f0; }
    @media (prefers-color-scheme: dark) { :root { --bg: #1a1a2e; --card-bg: #16213e; --text: #e0e0e0; --text-muted: #aaa; --accent: #3b82f6; --accent-h: #60a5fa; --border: #2a2a4a; --code-bg: #0f0f23; } }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .container { width: 100%; max-width: 800px; }
    .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 32px; }
    h1 { font-size: 1.6rem; margin-bottom: 6px; }
    .subtitle { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 24px; }
    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: 0.875rem; font-weight: 600; margin-bottom: 6px; }
    input, select { width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: 8px; font-size: 0.95rem; background: var(--card-bg); color: var(--text); outline: none; transition: border-color .2s; }
    input:focus, select:focus { border-color: var(--accent); }
    .row { display: flex; gap: 12px; }
    .row > * { flex: 1; }
    button { background: var(--accent); color: #fff; border: none; padding: 12px 24px; border-radius: 8px; font-size: 1rem; cursor: pointer; transition: background .2s; width: 100%; font-weight: 600; }
    button:hover { background: var(--accent-h); }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .result { margin-top: 24px; display: none; }
    .result-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .result-header span { font-size: 0.85rem; color: var(--text-muted); }
    .result-header a { font-size: 0.85rem; color: var(--accent); text-decoration: none; cursor: pointer; }
    pre { background: var(--code-bg); border: 1px solid var(--border); border-radius: 8px; padding: 16px; overflow-x: auto; font-size: 0.8rem; line-height: 1.5; max-height: 500px; overflow-y: auto; white-space: pre-wrap; word-break: break-all; }
    .error { color: #ef4444; background: rgba(239,68,68,.1); padding: 12px; border-radius: 8px; margin-top: 16px; display: none; }
    .loading { text-align: center; margin-top: 16px; display: none; color: var(--text-muted); }
    .tabs { display: flex; gap: 6px; margin-bottom: 16px; }
    .tab { padding: 8px 18px; border: 1px solid var(--border); border-radius: 6px; background: transparent; color: var(--text); font-size: 0.875rem; cursor: pointer; transition: all .2s; width: auto; font-weight: 400; }
    .tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    @media (max-width: 600px) { .card { padding: 20px; } .row { flex-direction: column; } }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>Mihomo → Dae/daed 订阅转换</h1>
      <p class="subtitle">将 Mihomo/Clash 订阅链接转换为 dae/daed eBPF 代理可识别的节点格式</p>
      <form id="convertForm">
        <div class="form-group">
          <label for="url">Mihomo 订阅链接</label>
          <input type="text" id="url" placeholder="https://example.com/subscription/mihomo.yaml" required>
        </div>
        <div class="form-group">
          <label for="fmt">输出格式</label>
          <select id="fmt">
            <option value="plain">Plain Text（每行一个节点链接，daed 推荐）</option>
            <option value="dae">Dae Config（完整 dae 配置文件片段）</option>
            <option value="json">JSON（API 模式）</option>
          </select>
        </div>
        <button type="submit" id="submitBtn">转换</button>
      </form>
      <div class="loading" id="loading">正在获取并转换...</div>
      <div class="error" id="error"></div>
      <div class="result" id="result">
        <div class="result-header">
          <span id="resultCount"></span>
          <a onclick="copyResult()">复制全部</a>
        </div>
        <pre id="resultContent"></pre>
      </div>
    </div>
  </div>

  <script>
    const form = document.getElementById('convertForm');
    const btn = document.getElementById('submitBtn');
    const resultDiv = document.getElementById('result');
    const resultCount = document.getElementById('resultCount');
    const resultContent = document.getElementById('resultContent');
    const loadingDiv = document.getElementById('loading');
    const errorDiv = document.getElementById('error');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const url = document.getElementById('url').value.trim();
      const fmt = document.getElementById('fmt').value;
      if (!url) return;

      btn.disabled = true;
      loadingDiv.style.display = 'block';
      errorDiv.style.display = 'none';
      resultDiv.style.display = 'none';

      try {
        const params = new URLSearchParams({ url, fmt });
        const resp = await fetch('/convert?' + params.toString());
        if (!resp.ok) {
          const err = await resp.json();
          throw new Error(err.error || resp.statusText);
        }
        const text = await resp.text();

        if (fmt === 'json') {
          const data = JSON.parse(text);
          resultCount.textContent = `共 ${data.count} 个节点`;
          resultContent.textContent = data.nodes.join('\n');
        } else {
          if (fmt === 'plain') {
            const lines = text.trim().split('\n').filter(l => l);
            resultCount.textContent = `共 ${lines.length} 个节点`;
          } else {
            resultCount.textContent = 'Dae 配置';
          }
          resultContent.textContent = text;
        }
        resultDiv.style.display = 'block';
      } catch (err) {
        errorDiv.textContent = '错误: ' + err.message;
        errorDiv.style.display = 'block';
      } finally {
        btn.disabled = false;
        loadingDiv.style.display = 'none';
      }
    });

    function copyResult() {
      navigator.clipboard.writeText(resultContent.textContent).then(() => {
        alert('已复制到剪贴板');
      });
    }
  </script>
</body>
</html>
